<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Seguridad Laboral</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; height: 100vh; background-color: #f4f7f6; }
        
        /* Barra Lateral Izquierda */
        .sidebar { width: 250px; background-color: #2c3e50; color: white; padding: 20px; position: fixed; height: 100%; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h2 { font-size: 1.2em; border-bottom: 1px solid #34495e; padding-bottom: 10px; margin-bottom: 20px; color: #3498db; }
        .sidebar a { display: block; color: #bdc3c7; text-decoration: none; padding: 10px; border-radius: 4px; transition: 0.3s; margin-bottom: 5px; }
        .sidebar a:hover { background-color: #34495e; color: white; }
        .sidebar a.active { background-color: #3498db; color: white; }

        /* Contenido Principal */
        .main-content { margin-left: 280px; padding: 40px; flex-grow: 1; max-width: 900px; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        h1 { color: #2c3e50; margin-top: 0; }
        .author-tag { background: #e8f4fd; color: #2980b9; padding: 5px 12px; border-radius: 15px; font-size: 0.85em; font-weight: bold; margin-right: 5px; }
        img.side-img { float: right; margin-left: 20px; border-radius: 10px; width: 280px; transition: transform 0.3s; }
        img.side-img:hover { transform: scale(1.02); }
        
        .footer { margin-top: 40px; font-size: 0.8em; color: #95a5a6; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>ÍNDICE</h2>
    <a href="index.html">🏠 Inicio</a>
    <a href="riesgos.html">⚠️ Riesgos Laborales</a>
    <a href="prevencion.html">🛡️ Prevención</a>
    <hr style="border: 0; border-top: 1px solid #34495e; margin: 20px 0;">
    <p style="font-size: 0.8em; color: #7f8c8d;">Autores:</p>
    <span style="font-size: 0.85em; display: block;">• Pablo Segura</span>
    <span style="font-size: 0.85em; display: block;">• Daniel Mendoza</span>
    <span style="font-size: 0.85em; display: block;">• Felix Zambrano</span>
</div>

<div class="main-content">
    <div class="card">
        {{ content }}
        
        <div class="footer">
            Proyecto: seguridad-trabajo-informática | 2026
        </div>
    </div>
</div>

</body>
</html>
