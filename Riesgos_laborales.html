<style>

body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  color: #1a1a1a;
  line-height: 1.8;
  background-color: #ffffff;
  margin: 0;
  padding: 20px;
}

h2 {
  color: #000000;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-top: 40px;
  margin-bottom: 20px;
  border-bottom: 4px solid #000000;
  display: inline-block;
  padding-bottom: 5px;
}

p {
  margin-bottom: 20px;
  font-size: 1.1em;
}

.cabecera-minimal {
  text-align: center;
  padding: 40px;
  background-color: #000000;
  color: #ffffff;
  margin: 20px auto;
}

.cabecera-minimal h1 {
  margin: 0;
  font-size: 3em;
}

.img-principal {
  display: block;
  margin: 30px auto;
  border: 10px solid #000000;
  max-width: 80%;
}

.contenedor-acordeon {
  max-width: 800px;
  margin: 40px auto;
}

.acordeon-item {
  background-color: #000000;
  color: #ffffff;
  cursor: pointer;
  padding: 20px 30px;
  width: 100%;
  border: none;
  text-align: left;
  font-size: 1.3em;
  font-weight: 800;
  border-bottom: 2px solid #ffffff;
  display: flex;
  justify-content: space-between;
}

.acordeon-item:hover, .acordeon-item.active {
  background-color: #333333;
}

.acordeon-item:after {
  content: '+';
  font-size: 1.5em;
}

.acordeon-item.active:after {
  content: '-';
} /* 🔥 AQUÍ ESTABA EL ERROR */

.panel-acordeon {
  padding: 0 30px;
  background-color: #000000;
  color: #ffffff;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease-out;
  border-bottom: 2px solid #ffffff;
}

.panel-acordeon.open {
  padding: 30px;
}

.panel-acordeon img {
  width: 100%;
  max-width: 500px;
  height: 250px;
  object-fit: cover;
  display: block;
  margin: 20px auto;
  border: 4px solid #ffffff;
}

</style>

<div>

<div class="cabecera-minimal">
  <h1>Prevención de Riesgos Laborales</h1>
</div>

<h2>Clasificación de Riesgos Principales</h2>

<div class="contenedor-acordeon">

<button class="acordeon-item">Riesgos Físicos</button>
<div class="panel-acordeon">
  <p>Ruido, iluminación o temperatura.</p>
  <img src="https://images.unsplash.com/photo-1516937941344-00b4e0337589">
</div>

<button class="acordeon-item">Químicos y Biológicos</button>
<div class="panel-acordeon">
  <p>Sustancias tóxicas o virus.</p>
  <img src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158">
</div>

<button class="acordeon-item">Psicosociales</button>
<div class="panel-acordeon">
  <p>Estrés o malas posturas.</p>
  <img src="https://images.unsplash.com/photo-1522204523234-8729aa6e3d5f">
</div>

</div>

<script>
var acc = document.getElementsByClassName("acordeon-item");

for (var i = 0; i < acc.length; i++) {
  acc[i].addEventListener("click", function() {

    this.classList.toggle("active");

    var panel = this.nextElementSibling;

    if (panel.style.maxHeight) {
      panel.style.maxHeight = null;
      panel.classList.remove("open");
    } else {
      panel.style.maxHeight = panel.scrollHeight + "px";
      panel.classList.add("open");
    }
  });
}
</script>

</div>
